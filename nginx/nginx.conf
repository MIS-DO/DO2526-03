user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    proxy_connect_timeout 5s;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;

    server {
        listen 80;
        server_name _;

        location = /healthz {
            default_type text/plain;
            return 200 'ok';
        }

        location = /search {
            return 301 /search/;
        }

        location = /songs {
            return 301 /songs/;
        }

        location = /movies {
            return 301 /movies/;
        }

        location = /football {
            return 301 /football/;
        }

        location /search/ {
            proxy_pass http://search-api:8080/;
            proxy_http_version 1.1;
            proxy_redirect ~^https?://[^/]+(/.*)$ /search$1;
            proxy_redirect ~^(/.*)$ /search$1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Prefix /search;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /songs/ {
            proxy_pass http://songs-api:8080/;
            proxy_http_version 1.1;
            proxy_redirect ~^https?://[^/]+(/.*)$ /songs$1;
            proxy_redirect ~^(/.*)$ /songs$1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Prefix /songs;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /movies/ {
            proxy_pass http://movies-api:8080/;
            proxy_http_version 1.1;
            proxy_redirect ~^https?://[^/]+(/.*)$ /movies$1;
            proxy_redirect ~^(/.*)$ /movies$1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Prefix /movies;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /football/ {
            proxy_pass http://football-api:8080/;
            proxy_http_version 1.1;
            proxy_redirect ~^https?://[^/]+(/.*)$ /football$1;
            proxy_redirect ~^(/.*)$ /football$1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Prefix /football;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Public compatibility routes for Swagger "Try it out" when upstream
        # specs omit the reverse-proxy prefix in OpenAPI "servers".
        location /api/v1/search {
            proxy_pass http://search-api:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/songs {
            proxy_pass http://songs-api:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/movies {
            proxy_pass http://movies-api:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/footballteams {
            proxy_pass http://football-api:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
