# Docker Compose - Production profile for API gateway

services:
  nginx:
    image: danvelcam621/do2526-nginx-gateway:1.0.0
    container_name: nginx-gateway
    ports:
      - "80:80"
    depends_on:
      search-api:
        condition: service_started
        restart: true
      songs-api:
        condition: service_started
        restart: true
      movies-api:
        condition: service_started
        restart: true
      football-api:
        condition: service_started
        restart: true
    healthcheck:
      test: [ "CMD", "nginx", "-t" ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    networks:
      - group-network
    restart: unless-stopped

  songs-api:
    image: danvelcam621/songs-api:latest
    container_name: songs-api
    environment:
      - MONGO_URI=mongodb://songs-mongo:27017
      - NODE_ENV=production
    depends_on:
      songs-mongo:
        condition: service_healthy
    networks:
      - group-network
    restart: unless-stopped

  songs-mongo:
    image: mongo
    container_name: songs-mongo
    volumes:
      - songs-mongo-data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - group-network
    restart: unless-stopped

  movies-api:
    image: migencmar/moviesapi:latest
    container_name: movies-api
    environment:
      - MONGO_URL=mongodb://movies-mongo:27017
      - NODE_ENV=production
    depends_on:
      movies-mongo:
        condition: service_healthy
    networks:
      - group-network
    restart: unless-stopped

  movies-mongo:
    image: mongo
    container_name: movies-mongo
    volumes:
      - movies-mongo-data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - group-network
    restart: unless-stopped

  football-api:
    image: jorgeflorentino8/footballteamapi:latest
    container_name: football-api
    environment:
      - MONGO_URL=mongodb://football-mongo:27017
      - NODE_ENV=production
    depends_on:
      football-mongo:
        condition: service_healthy
    networks:
      - group-network
    restart: unless-stopped

  football-mongo:
    image: mongo
    container_name: football-mongo
    volumes:
      - football-mongo-data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - group-network
    restart: unless-stopped

  search-api:
    image: danvelcam621/do2526-search-api:1.0.0
    container_name: search-api
    environment:
      - SONGS_API_URL=http://songs-api:8080
      - MOVIES_API_URL=http://movies-api:8080
      - FOOTBALL_API_URL=http://football-api:8080
      - NODE_ENV=production
    depends_on:
      - songs-api
      - movies-api
      - football-api
    networks:
      - group-network
    restart: unless-stopped

networks:
  group-network:
    driver: bridge

volumes:
  songs-mongo-data:
  movies-mongo-data:
  football-mongo-data:
