---
apiVersion: v1
kind: Service
metadata:
  name: songs-api
  namespace: search-preprod
spec:
  type: ClusterIP
  selector:
    app: songs-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: songs-api
  namespace: search-preprod
  labels:
    app: songs-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: songs-api
  template:
    metadata:
      labels:
        app: songs-api
    spec:
      containers:
        - name: songs-api
          image: danvelcam621/songs-api:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 150m
              memory: 192Mi
          env:
            - name: MONGO_URI
              value: mongodb://songs-mongo:27017
            - name: NODE_ENV
              value: production
