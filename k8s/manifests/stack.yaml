apiVersion: v1
kind: Namespace
metadata:
  name: search-preprod
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: songs-mongo-pvc
  namespace: search-preprod
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: movies-mongo-pvc
  namespace: search-preprod
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: football-mongo-pvc
  namespace: search-preprod
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: songs-mongo
  namespace: search-preprod
spec:
  type: ClusterIP
  selector:
    app: songs-mongo
  ports:
    - name: mongo
      port: 27017
      targetPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: movies-mongo
  namespace: search-preprod
spec:
  type: ClusterIP
  selector:
    app: movies-mongo
  ports:
    - name: mongo
      port: 27017
      targetPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: football-mongo
  namespace: search-preprod
spec:
  type: ClusterIP
  selector:
    app: football-mongo
  ports:
    - name: mongo
      port: 27017
      targetPort: 27017
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: songs-mongo
  namespace: search-preprod
  labels:
    app: songs-mongo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: songs-mongo
  template:
    metadata:
      labels:
        app: songs-mongo
    spec:
      containers:
        - name: mongo
          image: mongo:7
          ports:
            - containerPort: 27017
          resources:
            requests:
              cpu: 30m
              memory: 96Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
      volumes:
        - name: mongo-data
          persistentVolumeClaim:
            claimName: songs-mongo-pvc
